name: Build FFmpeg

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: 'FFmpeg version/tag to build'
        required: false
        default: 'n7.1'
  push:
    tags:
      - 'v*'

env:
  FFMPEG_VERSION: ${{ github.event.inputs.ffmpeg_version || 'n7.1' }}

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install nasm yasm pkg-config

      - name: Build FFmpeg
        run: |
          cd Sources/ffmpeg-source
          ./configure \
            --prefix=${{ github.workspace }}/build/macos-arm64 \
            --enable-static \
            --disable-shared \
            --disable-programs \
            --disable-doc \
            --disable-debug \
            --disable-autodetect \
            --arch=arm64 \
            --extra-cflags="-O3"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-arm64
          path: build/macos-arm64
          retention-days: 1

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install nasm yasm pkg-config

      - name: Build FFmpeg
        run: |
          cd Sources/ffmpeg-source
          ./configure \
            --prefix=${{ github.workspace }}/build/macos-x86_64 \
            --enable-static \
            --disable-shared \
            --disable-programs \
            --disable-doc \
            --disable-debug \
            --disable-autodetect \
            --arch=x86_64 \
            --extra-cflags="-O3"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-x86_64
          path: build/macos-x86_64
          retention-days: 1

  build-linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm yasm pkg-config

      - name: Build FFmpeg
        run: |
          cd Sources/ffmpeg-source
          ./configure \
            --prefix=${{ github.workspace }}/build/linux-x86_64 \
            --enable-static \
            --disable-shared \
            --disable-programs \
            --disable-doc \
            --disable-debug \
            --disable-autodetect \
            --enable-pic \
            --extra-cflags="-O3 -fPIC"
          make -j$(nproc)
          make install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-x86_64
          path: build/linux-x86_64
          retention-days: 1

  build-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm yasm pkg-config

      - name: Build FFmpeg
        run: |
          cd Sources/ffmpeg-source
          ./configure \
            --prefix=${{ github.workspace }}/build/linux-aarch64 \
            --enable-static \
            --disable-shared \
            --disable-programs \
            --disable-doc \
            --disable-debug \
            --disable-autodetect \
            --enable-pic \
            --extra-cflags="-O3 -fPIC"
          make -j$(nproc)
          make install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-aarch64
          path: build/linux-aarch64
          retention-days: 1

  package-artifacts:
    needs: [build-macos-arm64, build-macos-x86_64, build-linux-x86_64, build-linux-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds

      - name: Create artifact bundles
        run: |
          chmod +x scripts/create-artifact-bundles.sh
          ./scripts/create-artifact-bundles.sh

      - name: Upload artifact bundles
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-artifact-bundles
          path: Artifacts/*.artifactbundle.zip
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Artifacts/*.artifactbundle.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
